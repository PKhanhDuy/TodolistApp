spring.application.name=todoList

# Datasource (lay tu bien moi truong / file .env - xem .env.example)
# spring.datasource.url / username / password duoc Spring map tu SPRING_DATASOURCE_*

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

# CORS: origin cua frontend (co the ghi de bang bien APP_CORS_ALLOWED_ORIGINS)
app.cors.allowed-origins=http://localhost:5173
