spring.application.name=todoList

# Datasource (lay tu bien moi truong / file .env - xem .env.example)
# spring.datasource.url / username / password duoc Spring map tu SPRING_DATASOURCE_*

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

# CORS: origin cua frontend (co the ghi de bang bien APP_CORS_ALLOWED_ORIGINS)
app.cors.allowed-origins=http://localhost:5173

# JWT: secret PHAI dai >= 32 ky tu (HS256). Doi bang bien APP_JWT_SECRET trong production!
app.jwt.secret=${APP_JWT_SECRET:change-this-dev-secret-please-use-at-least-32-characters}
# Thoi han token (ms), mac dinh 1 ngay
app.jwt.expiration-ms=${APP_JWT_EXPIRATION_MS:86400000}
