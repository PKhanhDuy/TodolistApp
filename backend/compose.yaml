services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: todolist-backend:latest
    container_name: todolist-backend
    ports:
      - "8080:8080"
    environment:
      # DB cloud - cac gia tri nay lay tu file .env (xem .env.example)
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
      SPRING_JPA_HIBERNATE_DDL_AUTO: ${SPRING_JPA_HIBERNATE_DDL_AUTO:-update}
      APP_JWT_SECRET: ${APP_JWT_SECRET:-todolist-super-secret-key-change-me-in-production-2026}
      APP_JWT_EXPIRATION_MS: ${APP_JWT_EXPIRATION_MS:-86400000}
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS}
    restart: unless-stopped
