services:
  # Môi trường production: build và phục vụ qua nginx
  web:
    build:
      context: .
      target: production
    ports:
      - "8080:80"
    restart: unless-stopped

  # Môi trường development: hot reload với Vite
  # Chạy bằng: docker compose --profile dev up
  dev:
    profiles: ["dev"]
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - /app/node_modules
    command: npm run dev -- --host
