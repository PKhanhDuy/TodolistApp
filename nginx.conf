server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Hỗ trợ Single Page Application: mọi route đều trả về index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache cho các file tĩnh có hash
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
